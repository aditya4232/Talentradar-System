<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentRadar - AI Recruitment System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>🎯 TalentRadar</h1>
                <p>AI-Powered Recruitment System</p>
            </div>
            <div class="stats" id="stats">
                <div class="stat-card">
                    <h3 id="totalCandidates">0</h3>
                    <p>Total Candidates</p>
                </div>
                <div class="stat-card">
                    <h3 id="openToWork">0</h3>
                    <p>Open to Work</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalJobs">0</h3>
                    <p>Job Postings</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search Section -->
            <section class="search-section">
                <h2>🔍 Find Candidates</h2>
                <form id="searchForm">
                    <div class="form-group">
                        <label for="jobDescription">Job Description</label>
                        <textarea 
                            id="jobDescription" 
                            rows="6" 
                            placeholder="Enter job description with required skills, experience, etc..."
                            required
                        ></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input 
                                type="text" 
                                id="location" 
                                value="Hyderabad" 
                                placeholder="City or Region"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="limit">Max Results</label>
                            <input 
                                type="number" 
                                id="limit" 
                                value="20" 
                                min="5" 
                                max="50"
                            >
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="searchBtn">
                        🚀 Find Candidates
                    </button>
                </form>
            </section>

            <!-- Loading Indicator -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Searching for candidates... This may take a moment.</p>
            </div>

            <!-- Results Section -->
            <section class="results-section" id="resultsSection">
                <div class="results-header">
                    <h2>📊 Results</h2>
                    <div class="results-actions">
                        <button class="btn btn-secondary" onclick="exportToCSV()">📥 Export CSV</button>
                        <button class="btn btn-secondary" onclick="loadAllCandidates()">👥 View All Candidates</button>
                    </div>
                </div>
                
                <div id="candidatesList" class="candidates-list">
                    <p class="empty-state">No candidates found. Start a search to find talent!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
